name: Run Kotlin UUID Generator

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Kotlin compiler
      run: |
        wget https://github.com/JetBrains/kotlin/releases/download/v1.9.0/kotlin-compiler-1.9.0.zip
        unzip kotlin-compiler-1.9.0.zip
        export PATH=$PATH:$(pwd)/kotlinc/bin
    
    - name: Compile and run Kotlin
      run: |
        export PATH=$PATH:$(pwd)/kotlinc/bin
        kotlinc uuid -include-runtime -d uuid.jar
        java -jar uuid.jar
