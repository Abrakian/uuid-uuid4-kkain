name: Generate UUID

on: [push]

jobs:
  generate-uuid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run UUID script
        run: python uuid | tee output.txt
